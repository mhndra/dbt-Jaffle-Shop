version: 2

models:
  - name: stg_customers
    description: Staged customer data from our jaffle shop app.
    columns:
      - name: customer_id
        description: Primary key for customers
        data_tests:
          - not_null
          - unique
      - name: first_name
      - name: last_name
  
  - name: stg_orders
    description: Staged order data from our jaffle shop app.
    columns:
      - name: order_id
        description: Primary key for orders
        data_tests:
          - not_null
          - unique
      - name: customer_id
        description: Foreign key to stg_customers.customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id
      - name: order_date
      - name: status
        description: "{{ doc('order_status') }}"
        data_tests:
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'return_pending']
  
  - name: stg_stripe_payments
    description: Staged Stripe payment data from our jaffle shop app.
    columns:
      - name: payment_id
        description: Primary key for Stripe payments
        data_tests:
          - not_null
          - unique
      - name: order_id
        description: Foreign key to stg_orders.order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id
      - name: payment_method
      - name: status
        data_tests:
          - accepted_values:
              arguments:
                values: ['success', 'fail']
      - name: amount
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: '>= 0'
      - name: created_date